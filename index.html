<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排課系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #EDECEA;
  --surface: #FFFFFF;
  --surface2: #F3F2EF;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.16);
  --text: #1C1B18;
  --text-muted: #7A7870;
  --accent: #185FA5;
  --danger: #A32D2D;
  --danger-light: #FCEBEB;
  --r: 6px;
  --r-lg: 10px;
}
body {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border-strong);
  padding: 0 24px;
  height: 50px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 200;
}
.toolbar h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }
.toolbar .sub { font-size: 11px; color: var(--text-muted); }
.toolbar .sep { width: 1px; height: 18px; background: var(--border-strong); }
.toolbar .sp { flex: 1; }
.tbtn {
  height: 30px; padding: 0 12px;
  font-size: 12px; font-family: inherit;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--r);
  background: var(--surface); color: var(--text);
  cursor: pointer; white-space: nowrap;
  transition: background 0.12s;
}
.tbtn:hover { background: var(--surface2); }

/* ── Page outer ── */
.page-outer {
  padding: 20px 24px 48px;
  display: flex; flex-direction: column; align-items: center;
}

/* Controls row */
.controls-bar {
  width: 100%; max-width: 1090px;
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 12px; align-items: stretch;
}
.add-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 10px 14px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  flex: 0 0 auto;
}
.add-card label { font-size: 11px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
.add-card input {
  height: 30px; padding: 0 9px;
  font-size: 12px; font-family: inherit;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--r);
  background: var(--bg); color: var(--text);
  width: 130px; outline: none;
  transition: box-shadow 0.12s;
}
.add-card input:focus { box-shadow: 0 0 0 2px #378ADD33; border-color: var(--accent); }
.add-card input::placeholder { color: var(--text-muted); }
.add-btn {
  height: 30px; padding: 0 14px;
  font-size: 12px; font-family: inherit;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r);
  cursor: pointer; font-weight: 500;
  transition: background 0.12s;
}
.add-btn:hover { background: #0C447C; }

.pool-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 10px 14px;
  flex: 1; min-width: 0;
}
.pool-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.pool-head strong { font-size: 12px; font-weight: 500; }
.pool-head span { font-size: 11px; color: var(--text-muted); }
.pool-items { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }

.conflict-bar {
  display: none;
  width: 100%; max-width: 1090px;
  padding: 7px 12px;
  border-radius: var(--r);
  background: var(--danger-light);
  border: 0.5px solid #F7C1C1;
  color: var(--danger);
  font-size: 12px;
  margin-bottom: 10px;
}
.conflict-bar.show { display: block; }

/* ── A4 landscape sheet ── */
.a4-sheet {
  width: 100%; max-width: 1090px;
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 0.5px solid var(--border-strong);
  box-shadow: 0 2px 18px rgba(0,0,0,0.08);
  padding: 18px 20px 22px;
}
.sheet-header {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border-strong);
  padding-bottom: 10px;
}
.sheet-title { font-size: 16px; font-weight: 700; letter-spacing: 0.04em; }
.sheet-sub { font-size: 11px; color: var(--text-muted); }
.sheet-legend {
  margin-left: auto;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.leg-item { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text-muted); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; table-layout: fixed; }
thead th {
  background: var(--surface2);
  padding: 7px 3px;
  text-align: center;
  font-size: 11px; font-weight: 500;
  border: 0.5px solid var(--border-strong);
  white-space: nowrap;
}
.time-col { width: 76px; }
td { border: 0.5px solid var(--border-strong); padding: 0; vertical-align: top; }

.time-cell { background: var(--surface2); text-align: center; vertical-align: middle; }
.time-inner {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 4px 2px; height: 100%;
}
.time-text { white-space: nowrap; font-size: 9.5px; color: var(--text-muted); }
.tog {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 9px;
  border: 0.5px solid var(--border-strong);
  background: var(--surface); color: var(--text-muted);
  transition: background 0.1s; flex-shrink: 0; line-height: 1;
}
.tog:hover { background: var(--bg); }

/* Slot group */
.sg {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(2, 1fr);
  gap: 1px; height: 52px;
  overflow: hidden; transition: height 0.18s ease;
}
.slot {
  border-radius: 2px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: default;
  transition: outline 0.08s;
}
.slot.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }
.slbl { display: none; }
.sc {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; padding: 2px;
  text-align: center; width: 100%; height: 100%;
  pointer-events: none;
}
.sn { font-size: 8.5px; font-weight: 500; color: #fff; line-height: 1.2; word-break: break-all; }
.st { font-size: 7.5px; color: rgba(255,255,255,0.85); line-height: 1; }
.srm {
  position: absolute; top: 1px; right: 1px;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(0,0,0,0.22); display: none;
  align-items: center; justify-content: center;
  cursor: pointer; font-size: 7px; color: #fff; z-index: 2; line-height: 1;
}
.slot:hover .srm { display: flex; }
.slot-conflict { outline: 2px solid #E24B4A !important; outline-offset: -2px; }
.s-1b { background: #E6F1FB; }
.s-1a { background: #D3D1C7; }
.s-2s { background: #EAF3DE; }
.s-3a { background: #FAC775; }
.s-4b { background: #FBEAF0; }
.s-4a { background: #EEEDFE; }

.row-hidden .sg { height: 0 !important; }
.row-hidden .time-cell { background: var(--bg); }
.row-hidden .time-text { display: none; }

.break-row td { background: #FFFAF0 !important; }
.break-row .time-cell { background: #FFF0CC !important; }
.break-lbl { font-size: 12px; font-weight: 500; color: #854F0B; text-align: center; padding: 9px 4px; }
.dinner-row td { background: #F0F6FF !important; }
.dinner-row .time-cell { background: #D8EAFB !important; }
.dinner-lbl { font-size: 12px; font-weight: 500; color: #185FA5; text-align: center; padding: 6px 4px; }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 7px 5px 10px;
  border-radius: var(--r);
  background: var(--surface);
  border: 0.5px solid var(--border-strong);
  cursor: grab; user-select: none;
  transition: transform 0.1s, box-shadow 0.1s;
}
.chip:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.09); }
.chip:active { cursor: grabbing; transform: scale(0.96); }
.chip.dragging { opacity: 0.4; }
.chip-info { display: flex; flex-direction: column; gap: 1px; }
.chip-name { font-size: 11px; font-weight: 500; }
.chip-teacher { font-size: 9px; color: var(--text-muted); }
.chip-badge {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.chip-del {
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; cursor: pointer; color: var(--text-muted);
  border: 0.5px solid var(--border); background: transparent;
  transition: all 0.1s; flex-shrink: 0;
}
.chip-del:hover { background: var(--danger-light); color: var(--danger); border-color: #F7C1C1; }

.save-indicator {
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 5px;
  transition: opacity 0.3s;
}
.save-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4CAF50; flex-shrink: 0;
  transition: background 0.3s;
}
.save-dot.dirty { background: #FFA726; }

/* ── Print ── */
@media print {
  @page { size: A4 landscape; margin: 10mm 12mm; }
  .toolbar, .controls-bar, .conflict-bar { display: none !important; }
  body { background: #fff; }
  .page-outer { padding: 0; }
  .a4-sheet { border: none; border-radius: 0; box-shadow: none; padding: 0; max-width: 100%; width: 100%; }
  .sheet-header { border-bottom: 1px solid #ccc; margin-bottom: 8px; padding-bottom: 8px; }
  .sheet-title { font-size: 13px; }
  .tog { display: none; }
  .srm { display: none !important; }
  .row-hidden { display: none !important; }
  .sg { height: 46px !important; }
  table { font-size: 8.5px; }
  thead th { font-size: 9px; padding: 4px 2px; }
  .time-text { font-size: 8px; }
  .sn { font-size: 7.5px; }
  .st { font-size: 6.5px; }
  .slbl { font-size: 6.5px; }
  .break-lbl, .dinner-lbl { font-size: 10px; padding: 5px; }
  .leg-dot { width: 9px; height: 9px; }
  .leg-item { font-size: 9px; }
}

@media (max-width: 760px) {
  .toolbar { padding: 0 12px; }
  .page-outer { padding: 12px 8px 30px; }
  .add-card input { width: 110px; }
}
</style>
</head>
<body>

<div class="toolbar">
  <h1>排課系統</h1>
  <div class="sep"></div>
  <span class="sub">課表管理工具</span>
  <div class="sp"></div>
  <div class="save-indicator" id="save-indicator">
    <div class="save-dot" id="save-dot"></div>
    <span id="save-label">已儲存</span>
  </div>
  <div class="sep"></div>
  <button class="tbtn" onclick="clearStorage()">清除紀錄</button>
  <button class="tbtn" onclick="exportPDF()">列印 / PDF</button>
  <button class="tbtn" onclick="exportWord()">匯出 Word</button>
</div>

<div class="page-outer">

  <div class="controls-bar">
    <div class="add-card">
      <label>課程名稱</label>
      <input type="text" id="inp-course" placeholder="例：英文會話" />
      <label>教師姓名</label>
      <input type="text" id="inp-teacher" placeholder="例：陳老師" />
      <button class="add-btn" onclick="addCourse()">新增課程</button>
    </div>
    <div class="pool-card">
      <div class="pool-head">
        <strong>課程方塊</strong>
        <span>每課程可排 2 次，用完自動消失；課表內方塊可拖曳互換</span>
      </div>
      <div class="pool-items" id="pool"></div>
    </div>
  </div>

  <div class="conflict-bar" id="conflict-bar"></div>

  <div class="a4-sheet">
    <div class="sheet-header">
      <span class="sheet-title">週課表</span>
      <span class="sheet-sub">點時間欄 ▼ 可折疊該時段列</span>
      <div class="sheet-legend">
        <div class="leg-item"><div class="leg-dot" style="background:#E6F1FB"></div>1前</div>
        <div class="leg-item"><div class="leg-dot" style="background:#D3D1C7"></div>1後</div>
        <div class="leg-item"><div class="leg-dot" style="background:#FBEAF0"></div>4前</div>
        <div class="leg-item"><div class="leg-dot" style="background:#EEEDFE"></div>4後</div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table id="schedule-table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const DAYS = ['星期一','星期二','星期三','星期四','星期五','星期六'];
const TIME_ROWS = [
  {label:'0900-1030', type:'normal'},
  {label:'1030-1200', type:'normal'},
  {label:'1200-1330', type:'break'},
  {label:'1330-1500', type:'normal'},
  {label:'1500-1630', type:'normal'},
  {label:'1630-1800', type:'normal'},
  {label:'1800-1830', type:'dinner'},
  {label:'1830-2000', type:'normal'},
  {label:'2000-2130', type:'normal'},
];
const SLOTS = [
  {key:'1b',label:'1前',cls:'s-1b'},
  {key:'1a',label:'1後',cls:'s-1a'},
  {key:'4b',label:'4前',cls:'s-4b'},
  {key:'4a',label:'4後',cls:'s-4a'},
];
const COLORS = [
  '#185FA5','#1D9E75','#C0521A','#6B63CC',
  '#C04478','#9A6210','#2D7A4E','#7A2C6E','#3E6FA0','#5A7A2A',
];

let courses = [], schedule = {}, rowHidden = {}, dragSource = null;
const color = i => COLORS[i % COLORS.length];
const getCourse = id => courses.find(c => c.id === id);
const courseIdx = id => courses.findIndex(c => c.id === id);
const countUsed = id => Object.values(schedule).filter(v => v && v.cid === id).length;

function buildTable() {
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  thead.innerHTML = '<tr><th class="time-col">時間</th>' + DAYS.map(d => `<th>${d}</th>`).join('') + '</tr>';
  tbody.innerHTML = '';
  TIME_ROWS.forEach((row, ti) => {
    const tr = document.createElement('tr');
    tr.id = `tr-${ti}`;
    if (row.type === 'break') {
      tr.className = 'break-row';
      const tdT = document.createElement('td');
      tdT.className = 'time-cell';
      tdT.innerHTML = `<div class="time-inner"><span class="time-text">${row.label}</span></div>`;
      tr.appendChild(tdT);
      const tdB = document.createElement('td'); tdB.colSpan = 6;
      tdB.innerHTML = `<div class="break-lbl">午休時間</div>`;
      tr.appendChild(tdB); tbody.appendChild(tr); return;
    }
    if (row.type === 'dinner') {
      tr.className = 'dinner-row';
      const tdT = document.createElement('td');
      tdT.className = 'time-cell';
      tdT.innerHTML = `<div class="time-inner"><span class="time-text">${row.label}</span></div>`;
      tr.appendChild(tdT);
      const tdD = document.createElement('td'); tdD.colSpan = 6;
      tdD.innerHTML = `<div class="dinner-lbl">晚餐時間</div>`;
      tr.appendChild(tdD); tbody.appendChild(tr); return;
    }
    const tdT = document.createElement('td');
    tdT.className = 'time-cell';
    tdT.innerHTML = `<div class="time-inner"><span class="time-text">${row.label}</span><div class="tog" id="tog-${ti}" onclick="toggleRow(${ti})">▼</div></div>`;
    tr.appendChild(tdT);
    DAYS.forEach((d, di) => {
      const td = document.createElement('td');
      const sg = document.createElement('div');
      sg.className = 'sg'; sg.id = `sg-${ti}-${di}`;
      SLOTS.forEach((s, si) => {
        const slot = document.createElement('div');
        slot.className = `slot ${s.cls}`;
        slot.id = `slot-${ti}-${di}-${si}`;
        slot.dataset.ti = ti; slot.dataset.di = di; slot.dataset.si = si;
        const lbl = document.createElement('span');
        lbl.className = 'slbl'; lbl.textContent = s.label;
        slot.appendChild(lbl);
        slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
        slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
        slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('drag-over'); dropOnSlot(slot); });
        sg.appendChild(slot);
      });
      td.appendChild(sg); tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function toggleRow(ti) {
  rowHidden[ti] = !rowHidden[ti];
  const tr = document.getElementById(`tr-${ti}`);
  const tog = document.getElementById(`tog-${ti}`);
  if (rowHidden[ti]) { tr.classList.add('row-hidden'); if (tog) tog.textContent = '▶'; }
  else { tr.classList.remove('row-hidden'); if (tog) tog.textContent = '▼'; }
}

function renderPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  let hasAny = false;
  if (courses.length === 0) {
    pool.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">尚無課程，請在左側新增</span>';
    return;
  }
  courses.forEach((c, i) => {
    const used = countUsed(c.id);
    const remaining = 2 - used;
    if (remaining <= 0) return;
    hasAny = true;
    const col = color(i);
    const chip = document.createElement('div');
    chip.className = 'chip'; chip.draggable = true; chip.dataset.cid = c.id;
    chip.style.borderColor = col + '55'; chip.style.background = col + '10';
    chip.innerHTML = `<div class="chip-info"><span class="chip-name" style="color:${col}">${c.name}</span><span class="chip-teacher">${c.teacher}</span></div><div class="chip-badge" style="background:${col}">${remaining}</div><div class="chip-del" onclick="deleteCourse('${c.id}')">✕</div>`;
    chip.addEventListener('dragstart', e => { dragSource = { type: 'pool', cid: c.id }; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    pool.appendChild(chip);
  });
  if (!hasAny) pool.innerHTML = '<span style="font-size:11px;color:var(--text-muted)">所有課程已排入課表</span>';
}

function dropOnSlot(slot) {
  if (!dragSource) return;
  const { ti, di, si } = slot.dataset;
  const key = `${ti}-${di}-${si}`;
  if (dragSource.type === 'pool') {
    const cid = dragSource.cid;
    if (countUsed(cid) >= 2) return;
    schedule[key] = { cid };
  } else if (dragSource.type === 'slot') {
    const fromKey = dragSource.key;
    if (fromKey === key) return;
    const fromData = schedule[fromKey];
    if (!fromData) return;
    const toData = schedule[key];
    schedule[key] = fromData;
    if (toData) schedule[fromKey] = toData;
    else delete schedule[fromKey];
  }
  dragSource = null;
  renderSlots(); renderPool(); checkConflicts();
}

function renderSlots() {
  document.querySelectorAll('.slot').forEach(slot => {
    const { ti, di, si } = slot.dataset;
    const key = `${ti}-${di}-${si}`;
    const s = SLOTS[parseInt(si)];
    slot.querySelectorAll('.sc, .srm').forEach(el => el.remove());
    slot.classList.remove('slot-conflict');
    const lbl = slot.querySelector('.slbl');
    const data = schedule[key];
    if (data) {
      const course = getCourse(data.cid);
      if (!course) return;
      const col = color(courseIdx(data.cid));
      slot.style.background = col;
      if (lbl) lbl.style.display = 'none';
      const content = document.createElement('div');
      content.className = 'sc';
      content.innerHTML = `<span class="sn">${course.name}</span><span class="st">${course.teacher}</span>`;
      slot.draggable = true;
      slot.ondragstart = e => { dragSource = { type: 'slot', key }; e.dataTransfer.effectAllowed = 'move'; };
      slot.ondragend = () => { dragSource = null; };
      slot.appendChild(content);
      const rm = document.createElement('div');
      rm.className = 'srm'; rm.textContent = '✕';
      rm.onclick = () => { delete schedule[key]; slot.draggable = false; slot.ondragstart = null; renderSlots(); renderPool(); checkConflicts(); };
      slot.appendChild(rm);
    } else {
      slot.style.background = ''; slot.className = `slot ${s.cls}`;
      slot.draggable = false; slot.ondragstart = null;
      if (lbl) lbl.style.display = '';
    }
  });
}

function checkConflicts() {
  const teacherMap = {};
  Object.entries(schedule).forEach(([key, val]) => {
    if (!val) return;
    const course = getCourse(val.cid); if (!course) return;
    const parts = key.split('-');
    const tk = `${parts[0]}-${parts[1]}`;
    if (!teacherMap[course.teacher]) teacherMap[course.teacher] = {};
    if (!teacherMap[course.teacher][tk]) teacherMap[course.teacher][tk] = [];
    teacherMap[course.teacher][tk].push({ key, course });
  });
  const conflicts = [];
  Object.entries(teacherMap).forEach(([teacher, times]) => {
    Object.entries(times).forEach(([tk, entries]) => {
      if (entries.length > 1) {
        const [ti, di] = tk.split('-');
        conflicts.push(`${teacher} 在 ${DAYS[di]} ${TIME_ROWS[ti].label} 衝堂（${entries.map(e => e.course.name).join('、')}）`);
        entries.forEach(e => { const el = document.getElementById(`slot-${e.key}`); if (el) el.classList.add('slot-conflict'); });
      }
    });
  });
  const bar = document.getElementById('conflict-bar');
  if (conflicts.length) {
    bar.className = 'conflict-bar show';
    bar.innerHTML = '<strong>衝堂警告：</strong> ' + conflicts.join('　|　');
  } else { bar.className = 'conflict-bar'; }
}

function addCourse() {
  const name = document.getElementById('inp-course').value.trim();
  const teacher = document.getElementById('inp-teacher').value.trim();
  if (!name || !teacher) return;
  courses.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5), name, teacher });
  document.getElementById('inp-course').value = '';
  document.getElementById('inp-teacher').value = '';
  document.getElementById('inp-course').focus();
  renderPool();
}

function deleteCourse(cid) {
  Object.keys(schedule).forEach(k => { if (schedule[k]?.cid === cid) delete schedule[k]; });
  courses = courses.filter(c => c.id !== cid);
  renderPool(); renderSlots(); checkConflicts();
}

function exportPDF() { window.print(); }

function exportWord() {
  function getCellCourses(ti, di) {
    const seen = new Set();
    const result = [];
    SLOTS.forEach((s, si) => {
      const key = `${ti}-${di}-${si}`;
      const data = schedule[key];
      if (data && !seen.has(data.cid)) {
        seen.add(data.cid);
        result.push(getCourse(data.cid));
      }
    });
    return result.filter(Boolean);
  }

  function timeSplit(label) {
    const parts = label.split('-');
    return parts.length === 2 ? parts[0] + '<br>' + parts[1] : label;
  }

  let html = '<html xmlns:o=\'urn:schemas-microsoft-com:office:office\' xmlns:w=\'urn:schemas-microsoft-com:office:word\' xmlns=\'http://www.w3.org/TR/REC-html40\'><head><meta charset=\'utf-8\'><title>週課表</title>'
    + '<xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml>'
    + '<style>'
    + '@page Section1{size:842pt 595pt;mso-page-orientation:landscape;margin:36pt 45pt 36pt 45pt}'
    + 'div.Section1{page:Section1}'
    + 'body{font-family:\'新細明體\',serif;font-size:12pt}'
    + 'table{border-collapse:collapse;width:100%;table-layout:fixed}'
    + 'th{border:1pt solid #999;padding:4pt 3pt;text-align:center;vertical-align:middle;font-size:12pt;font-weight:bold;background:#f0f0f0}'
    + 'td{border:1pt solid #999;padding:4pt 3pt;text-align:left;vertical-align:top;font-size:12pt;word-wrap:break-word}'
    + '.tc{text-align:center;vertical-align:middle;background:#f7f7f7}'
    + '.brk{background:#FFFAF0;color:#854F0B;font-weight:bold;text-align:center;vertical-align:middle}'
    + '.din{background:#F0F6FF;color:#185FA5;font-weight:bold;text-align:center;vertical-align:middle}'
    + '.ci{margin-bottom:4pt;line-height:1.5}'
    + '.cn{font-weight:bold}'
    + '.ct{color:#555}'
    + '</style>'
    + '</head><body><div class="Section1">'
    + '<table><tr><th style="width:44pt">時間</th>' + DAYS.map(d => '<th>' + d + '</th>').join('') + '</tr>';

  TIME_ROWS.forEach((row, ti) => {
    if (row.type === 'break') {
      html += '<tr style="height:18pt"><td class="tc">' + timeSplit(row.label) + '</td><td colspan="6" class="brk">午休時間</td></tr>';
      return;
    }
    if (row.type === 'dinner') {
      html += '<tr style="height:18pt"><td class="tc">' + timeSplit(row.label) + '</td><td colspan="6" class="din">晚餐時間</td></tr>';
      return;
    }
    html += '<tr><td class="tc">' + timeSplit(row.label) + '</td>';
    DAYS.forEach((d, di) => {
      const cells = getCellCourses(ti, di);
      let cellHtml = cells.map(c =>
        '<div class="ci"><span class="cn">' + c.name + '</span><br><span class="ct">' + c.teacher + '</span></div>'
      ).join('');
      html += '<td>' + cellHtml + '</td>';
    });
    html += '</tr>';
  });

  html += '</table></div></body></html>';
  const blob = new Blob(['﻿', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '週課表.doc'; a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('inp-course').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-teacher').focus(); });
document.getElementById('inp-teacher').addEventListener('keydown', e => { if (e.key === 'Enter') addCourse(); });

// ── Storage ──
const STORAGE_KEY = 'schedule_v1';
let saveTimer = null;

function saveData() {
  try {
    const data = { courses, schedule };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setSaveStatus('saved');
  } catch(e) {
    console.warn('Save failed', e);
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.courses) courses = data.courses;
    if (data.schedule) schedule = data.schedule;
    return true;
  } catch(e) {
    return false;
  }
}

function setSaveStatus(state) {
  const dot = document.getElementById('save-dot');
  const lbl = document.getElementById('save-label');
  if (state === 'dirty') {
    dot.className = 'save-dot dirty';
    lbl.textContent = '儲存中...';
  } else {
    dot.className = 'save-dot';
    lbl.textContent = '已儲存';
  }
}

function autoSave() {
  setSaveStatus('dirty');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 600);
}

function clearStorage() {
  if (!confirm('確定要清除所有課表紀錄嗎？')) return;
  localStorage.removeItem(STORAGE_KEY);
  courses = []; schedule = {}; rowHidden = {};
  buildTable();
  renderPool();
  renderSlots();
  checkConflicts();
  setSaveStatus('saved');
}

// Patch save into mutating functions
const _origRenderSlots = renderSlots;
renderSlots = function() { _origRenderSlots(); autoSave(); };
const _origRenderPool = renderPool;
renderPool = function() { _origRenderPool(); };
const _origAddCourse = addCourse;
addCourse = function() { _origAddCourse(); autoSave(); };
const _origDeleteCourse = deleteCourse;
deleteCourse = function(cid) { _origDeleteCourse(cid); autoSave(); };

// ── Init ──
buildTable();
const hasData = loadData();
if (hasData) {
  renderSlots();
  checkConflicts();
}
renderPool();
setSaveStatus('saved');
</script>
